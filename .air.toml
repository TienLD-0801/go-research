root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  cmd = "go build -o tmp/main ./cmd/main.go"
  bin = "./tmp/main"
  delay = 1000
  exclude_dir = ["tmp", "vendor"]
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  include_file = []
  exclude_regex = ["_test\\.go"]

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = false

[proxy]
  app_port = 4000
  enabled = false

[screen]
  clear_on_rebuild = true
  keep_scroll = true


